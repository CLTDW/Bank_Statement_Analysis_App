  - 模糊词汇处理：对于模糊词汇，优先根据上下文和位置关系进行匹配
  - 多语言支持：同时支持中英文表头，英文词汇统一使用标准拼写
  - 缩写处理：对于常见缩写，如 "Amt" 仅匹配交易金额，"Acct" 匹配账号相关字段
  - 方向词处理：对于方向词（如"借方"、"贷方"），严格区分借贷方向，避免交叉匹配
  - 时间日期处理：严格区分日期和时间字段，避免相互混淆
