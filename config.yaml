# 银行流水处理配置文件

# 基础配置
base_dir: 'E:\\流水分析'
mapping_file: '表头映射表.xlsx'
template_file: '流水汇总模板.xlsx'
output_file: '银行流水文件汇总结果.xlsx'
log_file: '银行流水汇总日志.log'
report_file: '银行流水汇总情况报告.txt'
log_level: 'DEBUG'  # DEBUG/INFO/WARN/ERROR
max_check_header_rows: 15
max_column_width: 50
retry_times: 3  # 文件操作重试次数
retry_delay: 1  # 重试延迟（秒）

# 排除文件配置
excluded_files:
  - '表头映射表.xlsx'
  - '流水汇总模板.xlsx'
  - '银行流水汇总结果.xlsx'
  - '银行流水汇总日志.log'
  - '银行流水汇总情况报告.txt'

# 排除临时文件模式
excluded_patterns:
  - '~$*.xlsx'  # Excel临时文件
  - 'temp_*.xlsx'  # 程序生成的临时文件
  - '*.tmp'  # 通用临时文件
  - '*.bak'  # 备份文件

# 支持的文件格式
supported_formats: ['.xlsx', '.xls', '.csv', '.txt', '.pdf', '.html', '.htm', '.et']

# CSV/TXT通用配置
text_file_config:
  encodings: ['utf-8', 'gbk', 'gb2312', 'utf-8-sig', 'ansi']
  delimiters: [',', '\t', ';', '|', ' ']
  skip_blank_lines: true
  low_memory: false
  skip_rows: 0
  header_row_offset: 0

# 字段类型配置
field_types:
  text: ['账户号', '卡号', '本方卡号', '对方账号', '对方卡号', '柜员号', '地址', '交易账号', '账号']
  date: ['交易时间', '发生日期', '交易日期', '日期', '交易日']
  amount: ['交易金额', '账户余额', '余额', '发生额', '交易金额（元）', '余额（元）']
  debit_credit: ['借贷标志', '收付标志', '交易类型', '借贷方向', '收支标志']

# 借贷标志统一映射配置
debit_credit_mapping:
  '收': ['贷', 'C', '存', '贷方', '收', '收入', '进', '+', 'Credit', '2', '收款', '转入']
  '支': ['借', 'D', '付', '借方', '取', 'Debit', '-', '出', '支出', '1', '支', '付款', '转出']

