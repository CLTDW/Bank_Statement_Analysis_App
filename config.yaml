    - '北京'
    - '上海'
    - '广州'
    - '深圳'
    - '广东'
    - '江苏'
    - '浙江'
    - '山东'
    - '河南'
    - '湖北'
    - '成都'
    - '重庆'
    - '天津'
    - '南京'
    - '杭州'
    - '东莞'
    - '佛山'
    - '珠海'
    - '厦门'
    - '宁波'
    - '青岛'
    - '大连'
    - '苏州'
    - '无锡'
    - '常州'
    - '温州'
    - '绍兴'
    - '合肥'
    - '福州'
    - '泉州'

  # 3. 冗余后缀过滤表（去除银行名称中的无效后缀）
  redundant_suffixes:
    - '股份有限公司'
    - '有限责任公司'
    - '分行'
    - '支行'
    - '营业部'
    - '分理处'
    - '网点'
    - '总行'

# 日期格式扩展配置
date_formats:
  - '%Y年%m月%d日 %H%M%S'
  - '%Y年%m月%d日'
  - '%Y-%m-%d %H:%M:%S'
  - '%Y-%m-%d %H:%M'
  - '%Y/%m/%d %H:%M:%S'
  - '%Y/%m/%d'
  - '%Y-%m-%d'
  - '%Y%m%d'
  - '%Y%m%d %H%M%S'
  - '%Y/%m/%d %H:%M'
  - '%Y年%m月%d %H:%M:%S'

# 金额处理配置
amount_replace_patterns:
  - ['￥', '']
  - [',', '']
  - ['\\s+', '']
  - ['\\((\\d+(?:\\.\\d+)?)\\)', '-\\1']  # (100) → -100
  - ['(\\d+(?:\\.\\d+)?)-', '-\\1']  # 100- → -100

# 格式校验配置
date_validation_pattern: '^\\d{4}-\\d{2}-\\d{2}( \\d{2}:\\d{2}:\\d{2})?$'
amount_validation_pattern: '^-?\\d+(?:\\.\\d{1,2})?$'

# 并行处理配置
parallel:
  enabled: true
  max_workers: 32

# PDF处理配置
pdf_config:
  page_range: [0, 10]  # 只处理前10页
  min_text_length: 50  # 每页至少50个字符才处理
  table_extraction: true  # 开启表格提取