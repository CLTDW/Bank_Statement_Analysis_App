    # 优先匹配明确标注的姓名（提升精确度）
    - '姓名[:：\s]*([a-zA-Z\u4e00-\u9fa5]{2,6})'
    - '户主[:：\s]*([a-zA-Z\u4e00-\u9fa5]{2,6})'
    - '客户[:：\s]*([a-zA-Z\u4e00-\u9fa5]{2,6})'

  # 开户行匹配规则
  bank_patterns:
    # 优先级1：精准匹配（标注明确的开户行，最高优先级，避免干扰）
    - '开户行[:：\s]*([^\\/:*?\"<>|\\s]{2,30})'
    - '开户银行[:：\s]*([^\\/:*?\"<>|\\s]{2,30})'
    - '发卡行[:：\s]*([^\\/:*?\"<>|\\s]{2,30})'

    # 优先级2：核心精准匹配（国家/地域+标准银行名称，保留原逻辑，放宽长度限制）
    - '((中国|香港|澳门|台湾|新加坡|美国|英国|日本)(?:工商银行|农业银行|建设银行|中国银行|交通银行|邮政储蓄银行|招商银行|浦发银行|民生银行|兴业银行|中信银行|光大银行|华夏银行|广发银行|平安银行|恒丰银行|浙商银行|渤海银行|农商银行|村镇银行)股份有限公司?)'
    - '((中国|香港|澳门|台湾|新加坡|美国|英国|日本)(?:工商银行|农业银行|建设银行|中国银行|交通银行|邮政储蓄银行|招商银行|浦发银行|民生银行|兴业银行|中信银行|光大银行|华夏银行|广发银行|平安银行|恒丰银行|浙商银行|渤海银行|农商银行|村镇银行))'

    # 优先级3：包含性匹配（无地域强制，提取包含"银行"的核心内容，覆盖纯银行名称场景）
    - '([^\\/:*?\"<>|\\s]{2,30}银行[^\\/:*?\"<>|\\s]{0,10})'  # 匹配"XX银行"及后续冗余（如股份有限公司）
    - '([^\\/:*?\"<>|\\s]{2,10}银行)'  # 匹配纯"XX银行"（如平安银行、广发银行）

    # 优先级4：简称兜底匹配（覆盖无"银行"后缀的常见简称，最后兜底）
    - '(广发|平安|招行|交行|工行|农行|建行|中行|邮储|浦发|民生|兴业|中信|光大|华夏)'

  # 卡号/账户号提取配置
  card_account_config:
    min_valid_digit_length: 8
    date_number_patterns:
      - '^\d{8}$'  # YYYYMMDD
      - '^\d{6}$'  # YYMMDD
      - '^\d{14}$'  # YYYYMMDDHHMMSS
      - '^\d{12}$'  # YYYYMMDDHHMM

  # 卡号/账户号提取规则
  card_patterns:
    - '卡号[:：\s]*(\\d+)'
    - '银行卡[:：\s]*(\\d+)'
    - '(\\d+)'

  account_patterns:
    - '账户号[:：\s]*(\\d+)'
    - '账号[:：\s]*(\\d+)'
    - '(\\d+)[^年月日时分秒]'

  

